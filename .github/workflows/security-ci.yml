name: Aura Security CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "aura-security-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SECRET_KEY: "ci-secret-key-not-for-production"
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      APP_ENV: "testing"
      PREFERRED_URL_SCHEME: "http"
      RATE_LIMIT_STORAGE_URI: "memory://"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q --upgrade pip && pip install -q -r requirements-dev.txt

      - name: Compile changed Python sources
        run: python -m compileall -q app.py auth driver events ownership security migrations tests

      - name: Rehearse production migrations
        env:
          SQLALCHEMY_DATABASE_URI: "sqlite:////tmp/aura-migration-test.db"
        run: |
          rm -f /tmp/aura-migration-test.db
          python -m flask db upgrade
          python - <<'PY'
          from sqlalchemy import create_engine, inspect

          engine = create_engine("sqlite:////tmp/aura-migration-test.db")
          tables = set(inspect(engine).get_table_names())
          required = {"users", "user_sessions", "alembic_version"}
          missing = required - tables
          if missing:
              raise SystemExit(f"Migration rehearsal missing tables: {sorted(missing)}")
          print("Migration rehearsal created required tables.")
          PY

      - name: Test security foundation
        run: pytest -q --tb=short tests/test_security_foundation.py

      - name: Test sensitive-route rate limiting
        run: pytest -q --tb=short tests/test_rate_limits.py

      - name: Test email verification
        run: pytest -q --tb=short tests/test_email_verification.py

      - name: Test session registry and revocation
        shell: bash
        run: |
          set +e
          pytest -q --tb=short tests/test_session_registry.py 2>&1 | tee session-registry-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Post session registry failure to PR
        if: always() && failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "### Aura session registry test failure"
            echo
            echo '```text'
            tail -n 180 session-registry-output.txt
            echo '```'
          } > session-registry-comment.md
          gh pr comment "$PR_URL" --body-file session-registry-comment.md

      - name: Run Ruff on security changes
        run: ruff check --output-format=concise app.py auth/routes.py driver/routes.py events/routes.py ownership/routes.py security tests

      - name: Run Bandit on security changes
        run: bandit -q -r app.py auth driver events ownership security -x ./tests

      - name: Audit dependencies
        run: pip-audit -r requirements.txt
