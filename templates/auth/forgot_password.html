<!-- templates/auth/forgot_password.html -->

<!doctype html>
{% extends "base.html" %}

{% block content %}
<div class="container py-5" style="max-width:500px;">

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <h3 class="mb-3">Forgot Password</h3>

            <p class="text-muted">
                Enter your email. If your account exists, recovery steps will be sent.
            </p>

            <form method="POST">

                <div class="mb-3">
                    <label>Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           required>
                </div>

                <button class="btn btn-primary w-100">
                    Send Recovery Link
                </button>

            </form>

            <div class="mt-3 text-center">
                <a href="{{ url_for('auth.login') }}">
                    Back to Login
                </a>
            </div>

        </div>
    </div>

</div>
{% endblock %}
