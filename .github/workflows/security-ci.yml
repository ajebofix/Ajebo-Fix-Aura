name: Aura Security CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: "aura-security-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SECRET_KEY: "ci-secret-key-not-for-production"
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      APP_ENV: "testing"
      PREFERRED_URL_SCHEME: "http"
      RATE_LIMIT_STORAGE_URI: "memory://"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q --upgrade pip && pip install -q -r requirements-dev.txt

      - name: Compile changed Python sources
        run: python -m compileall -q app.py auth driver events ownership security tests

      - name: Test security headers
        shell: bash
        run: |
          set +e
          pytest -q --tb=short tests/test_security_foundation.py::test_security_headers_are_applied 2>&1 | tee pytest-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Post pytest failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "### Aura Security CI failure"
            echo
            echo '```text'
            tail -n 120 pytest-output.txt
            echo '```'
          } > pytest-comment.md
          gh pr comment "$PR_URL" --body-file pytest-comment.md

      - name: Test CSRF rejection
        run: pytest -q --tb=short tests/test_security_foundation.py::test_unsafe_request_without_csrf_token_is_rejected

      - name: Test route registration
        run: pytest -q --tb=short tests/test_security_foundation.py::test_expected_route_prefixes_are_registered_once

      - name: Test root disclosure protection
        run: pytest -q --tb=short tests/test_security_foundation.py::test_root_does_not_disclose_internal_route_inventory

      - name: Test health endpoint
        run: pytest -q --tb=short tests/test_security_foundation.py::test_health_endpoint_is_available

      - name: Test sensitive-route rate limiting
        run: pytest -q --tb=short tests/test_rate_limits.py

      - name: Run Ruff on security changes
        shell: bash
        run: |
          set +e
          ruff check --output-format=concise app.py auth/routes.py driver/routes.py events/routes.py ownership/routes.py security tests 2>&1 | tee ruff-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Post Ruff failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "### Aura Ruff failure"
            echo
            echo '```text'
            tail -n 160 ruff-output.txt
            echo '```'
          } > ruff-comment.md
          gh pr comment "$PR_URL" --body-file ruff-comment.md

      - name: Run Bandit on security changes
        shell: bash
        run: |
          set +e
          bandit -q -r app.py auth driver events ownership security -x ./tests 2>&1 | tee bandit-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Post Bandit failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "### Aura Bandit failure"
            echo
            echo '```text'
            tail -n 200 bandit-output.txt
            echo '```'
          } > bandit-comment.md
          gh pr comment "$PR_URL" --body-file bandit-comment.md

      - name: Audit dependencies
        shell: bash
        run: |
          set +e
          pip-audit -r requirements.txt 2>&1 | tee pip-audit-output.txt
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Post dependency audit failure to PR
        if: failure() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          {
            echo "### Aura dependency audit failure"
            echo
            echo '```text'
            tail -n 200 pip-audit-output.txt
            echo '```'
          } > pip-audit-comment.md
          gh pr comment "$PR_URL" --body-file pip-audit-comment.md
