name: Aura Security CI

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: "aura-security-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SECRET_KEY: "ci-secret-key-not-for-production"
      SQLALCHEMY_DATABASE_URI: "sqlite:///:memory:"
      APP_ENV: "testing"
      PREFERRED_URL_SCHEME: "http"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -q --upgrade pip && pip install -q -r requirements-dev.txt

      - name: Compile changed Python sources
        run: python -m compileall -q app.py auth driver events ownership security tests

      - name: Run tests
        run: pytest -q --tb=short --junitxml=pytest-results.xml

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Run Ruff on security changes
        run: ruff check app.py auth/routes.py driver/routes.py events/routes.py ownership/routes.py security tests

      - name: Run Bandit on security changes
        run: bandit -q -r app.py auth driver events ownership security -x ./tests

      - name: Audit dependencies
        run: pip-audit -r requirements.txt
