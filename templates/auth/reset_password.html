<!-- templates/auth/reset_password.html -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Aura</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #111827;
        }

        .wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: #ffffff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .subtext {
            margin: 0 0 22px;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 6px;
            margin-top: 14px;
            font-weight: bold;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .flash {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .flash.success {
            background: #dcfce7;
            color: #166534;
        }

        .flash.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .flash.info {
            background: #dbeafe;
            color: #1e40af;
        }

        .helper {
            margin-top: 16px;
            font-size: 13px;
            color: #6b7280;
            text-align: center;
        }

        .helper a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }

        .checkbox-row {
            margin-top: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #374151;
        }

        .checkbox-row input {
            width: auto;
            padding: 0;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">

        <h1>Reset Password</h1>

        <p class="subtext">
            Create a new secure password for your Aura account.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <label for="new_password">New Password</label>
            <input
                type="password"
                id="new_password"
                name="new_password"
                required
                minlength="8"
                autocomplete="new-password"
            >

            <label for="confirm_password">Confirm Password</label>
            <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
                minlength="8"
                autocomplete="new-password"
            >

            <div class="checkbox-row">
                <input type="checkbox" id="showPasswords" onclick="togglePasswords()">
                <label for="showPasswords" style="margin:0; font-weight:normal;">
                    Show passwords
                </label>
            </div>

            <button type="submit">
                Reset Password
            </button>

        </form>

        <div class="helper">
            Remembered it?
            <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>

    </div>
</div>

<script>
function togglePasswords() {
    const p1 = document.getElementById("new_password");
    const p2 = document.getElementById("confirm_password");

    const type = p1.type === "password" ? "text" : "password";

    p1.type = type;
    p2.type = type;
}
</script>

</body>
</html>
