<!doctype html>
{% extends "base.html" %}

{% block content %}
<div class="container py-5" style="max-width:550px;">

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <h3 class="mb-4">Change Password</h3>

            <form method="POST">

                <div class="mb-3">
                    <label>Current Password</label>
                    <input type="password"
                           name="current_password"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label>New Password</label>
                    <input type="password"
                           name="new_password"
                           class="form-control"
                           minlength="8"
                           required>
                </div>

                <div class="mb-3">
                    <label>Confirm New Password</label>
                    <input type="password"
                           name="confirm_password"
                           class="form-control"
                           minlength="8"
                           required>
                </div>

                <button class="btn btn-success w-100">
                    Update Password
                </button>

            </form>

            <div class="mt-3 text-center">
                <a href="{{ url_for('dashboard.aura_home') }}">
                    Cancel
                </a>
            </div>

        </div>
    </div>

</div>
{% endblock %}
