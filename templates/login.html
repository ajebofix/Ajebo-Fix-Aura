<!-- templates/login.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aura Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 420px;
            margin: 20px auto;
            padding: 12px;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .wrap{
            max-width: 430px;
            margin: 0 auto;
        }

        .card{
            background: #ffffff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-bottom: 6px;
            font-size: 28px;
        }

        .subtext {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input [type="email"], input [type="password"], input [type="text"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-top: 6px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus{
            border-color: #2463eb;
        }

        .row{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .remember{
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #374151;
        }

        .remember input{
            width: auto;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #111827;
            color: #fff;
            font-weight: 700;
        }

        button:hover {
            opacity: .94;
        }

        .flash {
            padding:10px;
            margin-bottom:12px;
            border-radius:6px;
            font-size: 14px;
        }

        .flash.success {
            background:#e6fffa;
            color:#065f46;
        }

        .flash.error {
            background:#fee2e2;
            color:#991b1b;
        }

        .flash.info{
            background: #dbeafe;
            color: #1d4ed8;
        }

        .bottom{
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            line-height: 1.8;
        }

        .hint {
            font-size:14px;
            margin-top:16px;
            color: #555;
        }

        a {
            color:#2563eb;
            text-decoration:none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

        .tiny{
            font-size: 12px;
            color: #6b7280;
            margin-top: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>Aura Access</h1>
<p class="subtext">
    Secure access to your vehicle health records
</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<form method="POST" action="{{ url_for('auth.login') }}">
    <label>Email address</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" id="password" required>

    <div class="row">
        <label class="remember">
            <input type="checkbox" name="remember">
            Keep me signrd in
        </label>

        <a href="{{ url_for('auth.forgot_password') }}">
            Forgot password
        </a>

    </div>

    <div class="tiny">
        <label class="remember" style="justify-content: center;">
            <input type="checkbox" onclick="togglePassword()">
            Show password
        </label>
    </div>

    <button type="submit">Continue</button>
</form>

<div class="bottom">
    New client? <a href="{{ url_for('auth.signup') }}">Create an account</a>
    <br>
    Logged in already?
    <a href="{{ url_for('auth.change_password') }}">Change password</a>
</div>

<script>
    
/**
 * Toggle the type of the password input field between "password" and "text".
 * This allows the user to toggle the visibility of their password.
 */
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
