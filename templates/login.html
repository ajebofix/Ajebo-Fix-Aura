<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 420px;
            margin: 20px auto;
            padding: 12px;
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1 {
            margin-bottom: 6px;
        }

        .subtext {
            font-size: 14px;
            color: #555;
            margin-bottom: 16px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-top: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 18px;
            cursor: pointer;
        }

        .flash {
            padding:10px;
            margin-bottom:12px;
            border-radius:6px;
        }

        .flash.success {
            background:#e6fffa;
            color:#065f46;
        }

        .flash.error {
            background:#fee2e2;
            color:#991b1b;
        }

        .hint {
            font-size:14px;
            margin-top:16px;
            color: #555;
        }

        a {
            color:#2563eb;
            text-decoration:none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h1>Client Access</h1>
<p class="subtext">
    Secure access to your vehicle health records
</p>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

<form method="POST" action="{{ url_for('auth.login') }}">
    <label>Email address</label>
    <input type="email" name="email" required>

    <label>Password</label>
    <input type="password" name="password" id="password" required>

    <label class="hint">
        <input type="checkbox" onclick="togglePassword()"> Show password
    </label>

    <button type="submit">Continue</button>
</form>

<div class="hint">
    New client? <a href="{{ url_for('auth.signup') }}">Create an account</a>
</div>

<script>
function togglePassword() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
